name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"

  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/wedding-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/wedding-app
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: frontend/wedding-app
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}
          EXPO_PUBLIC_SIGNALR_URL: ${{ secrets.SIGNALR_URL }}
          EXPO_NO_TELEMETRY: "1"
        run: npx expo export --platform web

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/wedding-app/dist"
          skip_app_build: true
