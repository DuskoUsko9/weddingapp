name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"

  workflow_dispatch:

env:
  CONTAINER_APP: wedding-api
  RESOURCE_GROUP: wedding-app-rg

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure Container Apps
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/wedding-app-api" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure GHCR registry in Container App
        run: |
          az containerapp registry set \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ghcr.io \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GHCR_TOKEN }}

      - name: Update Container App image and env vars
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --set-env-vars \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "ASPNETCORE_URLS=http://+:8080" \
              "ConnectionStrings__DefaultConnection=${{ secrets.SQL_CONNECTION_STRING }}" \
              "Jwt__Secret=${{ secrets.JWT_SECRET }}" \
              "Jwt__Issuer=WeddingApp" \
              "Jwt__Audience=WeddingAppUsers" \
              "Cors__AllowedOrigins__0=${{ secrets.FRONTEND_URL }}" \
              "Azure__BlobStorage__ConnectionString=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              "Azure__BlobStorage__ContainerName=photos"
