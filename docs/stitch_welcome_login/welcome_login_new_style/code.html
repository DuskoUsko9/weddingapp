<!DOCTYPE html>

<html lang="sk"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Madu - Vitajte</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@400;500;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#FCFAF7", // Ivory
              "primary": "#8A9A8A", // Sage
              "primary-container": "#A3B1A3", // Lighter Sage
              "secondary": "#E8BCB9", // Blush
              "tertiary": "#C5A059", // Gold
              "on-surface": "#2D312D",
              "on-surface-variant": "#5F635F",
              "outline": "#8F938F",
              "outline-variant": "#DCE1DC",
              "surface-container-high": "#F2EFE9",
              "surface-container-lowest": "#FFFFFF",
              "on-primary": "#FFFFFF"
            },
            fontFamily: {
              "headline": ["Noto Serif", "serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        background-color: #FCFAF7;
        color: #2D312D;
        -webkit-font-smoothing: antialiased;
        font-family: 'Manrope', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .editorial-shadow {
        box-shadow: 0 8px 32px rgba(138, 154, 138, 0.15);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<!-- Primary Canvas: iPhone-style portrait container -->
<main class="w-full max-w-[420px] h-[844px] bg-surface overflow-hidden relative flex flex-col rounded-[3rem] shadow-2xl border-[8px] border-on-surface/5">
<!-- Hero Section: High-quality artistic couple photo -->
<div class="relative h-[45%] w-full overflow-hidden">
<img class="w-full h-full object-cover brightness-[0.98]" data-alt="cinematic shot of a couple walking through a golden field at sunset, warm artistic lighting, soft focus background, luxury wedding photography style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCt4SV63cfZILjAu2jhc7ERXOxPwQJV8KatzdbTiG0RMtgJYsVoHtsK9_1pqxP2KIpvqZ_GMv2bW7aIZT-ZEQR6-YOnRufzdE2l3lq7aDiwD8mGbPfMcAVXzzv7b8nEdbpVIJKEb0RuFB9NVgDEjpEu6oaU53E24ZOON0XJnCQ-wKWr7rvubRvpk-EhJ05HUhP7wQ2XcMdprUFjTO-nS2rL7sdMm25H1KP-ULDKVaDew5HyGjusOxn7NGzWDAErOK3gDAyc01DRn0Y"/>
<!-- Tonal Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
<!-- Brand Logo Overlaid on Hero -->
<div class="absolute bottom-6 left-0 w-full text-center">
<h1 class="font-headline italic text-5xl tracking-wide text-tertiary">
                Madu
            </h1>
</div>
</div>
<!-- Content Area -->
<div class="flex-1 px-10 pt-8 flex flex-col items-center">
<div class="text-center mb-10">
<h2 class="font-headline text-2xl text-on-surface mb-2">Vitajte na našej svadbe</h2>
<p class="font-body text-on-surface-variant text-sm tracking-wide leading-relaxed">Pripravili sme pre vás digitálneho sprievodcu týmto výnimočným dňom.</p>
</div>
<!-- Login Form -->
<div class="w-full space-y-8">
<!-- Input Field -->
<div class="space-y-3">
<label class="font-label text-[10px] uppercase tracking-[0.25em] text-outline font-extrabold px-1" for="guest-name">
                    Vaše meno
                </label>
<input class="w-full h-16 bg-surface-container-high border-none rounded-xl px-6 font-body text-on-surface placeholder:text-outline/60 focus:ring-1 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all duration-300" id="guest-name" placeholder="Napíšte svoje meno..." type="text"/>
<p class="text-[11px] text-on-surface-variant/70 italic text-center pt-2 px-4 leading-relaxed">
                    Stačí zadať vaše meno, nepotrebujete heslo.
                </p>
</div>
<!-- Primary CTA -->
<button class="w-full h-16 bg-primary rounded-xl text-on-primary font-body font-bold text-lg tracking-wide editorial-shadow hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Vstúpiť
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<!-- Role Hints / Subtle Help -->
<div class="mt-auto pb-12 text-center w-full">
<div class="inline-flex items-center gap-2 mb-3">
<div class="h-[1px] w-8 bg-outline-variant"></div>
<span class="font-label text-[10px] uppercase tracking-widest text-outline">Špeciálne role</span>
<div class="h-[1px] w-8 bg-outline-variant"></div>
</div>
<p class="text-[10px] text-outline leading-relaxed max-w-[200px] mx-auto">
                Hostia s prístupom ako <span class="font-bold text-primary/80">djmiles</span>, <span class="font-bold text-primary/80">starejsi</span>, alebo <span class="font-bold text-primary/80">maduadmin</span> získajú rozšírené funkcie.
            </p>
</div>
</div>
<!-- Bottom indicator -->
<div class="h-1.5 w-32 bg-on-surface/5 rounded-full mx-auto mb-2"></div>
</main>
<!-- Background Decoration for Desktop View -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none hidden md:block">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary/10 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-48 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-24 left-1/2 w-64 h-64 bg-tertiary/5 rounded-full blur-2xl"></div>
</div>
</body></html>
