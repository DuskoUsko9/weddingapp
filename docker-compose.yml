services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wedding_sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Wedding@Local123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Wedding@Local123' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wedding_api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Initial Catalog=weddingapp;User ID=sa;Password=Wedding@Local123;MultipleActiveResultSets=True;Encrypt=False;TrustServerCertificate=True;"
      Jwt__Secret: "local-dev-secret-minimum-32-chars-long!"
      Jwt__Issuer: "WeddingApp"
      Jwt__Audience: "WeddingAppUsers"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "http://localhost:8081"
      Cors__AllowedOrigins__2: "http://localhost:19006"
      Cors__AllowedOrigins__3: "exp://localhost:8081"
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/swagger/index.html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: node:22-alpine
    container_name: wedding_frontend
    restart: always
    working_dir: /app
    volumes:
      - ./frontend/wedding-app:/app
      - frontend_node_modules:/app/node_modules
    environment:
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_API_URL: "http://localhost:5000/api/v1"
      EXPO_PUBLIC_SIGNALR_URL: "http://localhost:5000"
    ports:
      - "3000:3000"
    command: sh -c "npm install --legacy-peer-deps && npx expo install react-native-safe-area-context react-native-screens react-native-gesture-handler react-native-reanimated && npx expo start --web --port 3000 --host lan"
    depends_on:
      api:
        condition: service_healthy

volumes:
  sqlserver_data:
  frontend_node_modules:
